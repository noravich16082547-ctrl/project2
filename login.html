<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — DormCRU</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header class="topbar"><div class="container" id="site-nav"></div></header>

<div class="auth-wrap">
  <div class="auth-card">
    <h2>เข้าสู่ระบบนักศึกษา</h2>
    <p class="muted" style="margin-top:-8px">ล็อคอินเพื่อจองห้องพักและบันทึกรายการที่ถูกใจ</p>
    <form id="loginForm">
      <div class="form-field">
        <label>อีเมล</label>
        <input type="email" id="email" required placeholder="youremail@crru.ac.th">
      </div>
      <div class="form-field">
        <label>รหัสผ่าน</label>
        <input type="password" id="password" required placeholder="••••••••">
        <div class="form-error" id="err">อีเมลหรือรหัสผ่านไม่ถูกต้อง</div>
      </div>
      <button class="btn btn-primary btn-block" type="submit">เข้าสู่ระบบ</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:.9rem">ยังไม่มีบัญชี? <a href="register.html" style="color:var(--forest);font-weight:600">สมัครสมาชิก</a></p>
    <p class="form-hint" style="text-align:center">ทดลองใช้: สมัครสมาชิกใหม่ได้ทันที ระบบนี้เป็นโปรโตไทป์เก็บข้อมูลในเบราว์เซอร์ของคุณ</p>
  </div>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script>
renderNav();
document.getElementById('loginForm').addEventListener('submit', (e)=>{
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const users = dbGet(DB_KEYS.USERS, []);
  const found = users.find(u=>u.email===email && u.password===password);
  if(!found){
    document.getElementById('err').style.display='block';
    return;
  }
  dbSet(DB_KEYS.SESSION, { email: found.email, name: found.name });
  toast('เข้าสู่ระบบสำเร็จ ยินดีต้อนรับ '+found.name,'success');
  const redirect = sessionStorage.getItem('dormcru_redirect');
  sessionStorage.removeItem('dormcru_redirect');
  setTimeout(()=> location.href = redirect || 'index.html', 500);
});
</script>
</body>
</html>
