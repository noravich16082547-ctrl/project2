<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายการที่ถูกใจ — DormCRU</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header class="topbar"><div class="container" id="site-nav"></div></header>

<section class="section container">
  <div class="section-head">
    <h2>หอพักที่ถูกใจของคุณ</h2>
    <span class="count" id="resultCount"></span>
  </div>
  <div class="dorm-grid" id="dormGrid"></div>
</section>

<footer>
  <div class="container flex-between">
    <span>© 2026 DormCRU</span>
    <a href="index.html">กลับไปค้นหาหอพัก</a>
  </div>
</footer>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script>
renderNav('wishlist');

function dormCardHtml(d){
  const vac = totalVacancy(d);
  return `
  <div class="card-dorm">
    <a href="dorm-detail.html?id=${d.id}" class="card-media">
      <img src="${d.images[0]}" alt="${d.name}" loading="lazy">
      <span class="badge-type">${d.hallType}</span>
      <span class="badge-vacancy ${vac===0?'full':''}">${vac===0?'เต็ม':'ว่าง '+vac+' ห้อง'}</span>
    </a>
    <button class="wishlist-btn active" data-wish="${d.id}">❤️</button>
    <div class="card-body">
      <a href="dorm-detail.html?id=${d.id}"><h3>${d.name}</h3></a>
      <div class="card-meta"><span class="walk-chip">🚶 ${d.distFront.toFixed(1)} กม. จากประตูหน้ามอ</span></div>
      <div class="card-price">
        <div class="amount">${fmtBaht(minPrice(d))}<small> บาท/เดือน เริ่มต้น</small></div>
        <a href="dorm-detail.html?id=${d.id}" class="btn btn-outline btn-sm">ดูรายละเอียด</a>
      </div>
    </div>
  </div>`;
}

function render(){
  if(!requireLogin('เข้าสู่ระบบเพื่อดูรายการที่ถูกใจของคุณ')) return;
  const ids = getWishlist();
  const dorms = getDorms().filter(d=>ids.includes(d.id));
  const grid = document.getElementById('dormGrid');
  document.getElementById('resultCount').textContent = `${dorms.length} รายการ`;
  if(dorms.length===0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="emoji">💭</div><p>ยังไม่มีหอพักที่บันทึกไว้ <a href="index.html">ไปค้นหาหอพักกันเลย</a></p></div>`;
    return;
  }
  grid.innerHTML = dorms.map(dormCardHtml).join('');
  document.querySelectorAll('[data-wish]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.preventDefault();
      toggleWishlist(btn.dataset.wish);
      toast('นำออกจากรายการที่ถูกใจแล้ว','success');
      render();
    });
  });
}
render();
</script>
</body>
</html>
